<svg width="400" height="600" viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Fond général -->
  <rect width="400" height="600" fill="#0A1628"/>
  
  <!-- Section logo -->
  <g transform="translate(28, 28)">
    <!-- Icône carrée arrondie -->
    <rect x="0" y="0" width="48" height="48" rx="10" fill="#00B4D8"/>
    <!-- Lettre K -->
    <text x="24" y="33" font-size="26" font-weight="800" fill="white" text-anchor="middle">K</text>
    <!-- Texte à droite -->
    <text x="64" y="18" font-size="16" font-weight="700" fill="white" letter-spacing="0.5">KAMLOG EM-ERP</text>
    <text x="64" y="34" font-size="10" font-weight="400" fill="#00B4D8">Enterprise Management</text>
  </g>
  
  <!-- Illustration centrale - Port maritime -->
  <g transform="translate(0, 90)">
    <!-- Eau/mer -->
    <path d="M0 220 Q50 215 100 220 T200 220 T300 220 T400 220 L400 280 L0 280 Z" fill="#0D1F3C" opacity="0.5"/>
    <path d="M0 220 Q50 215 100 220 T200 220 T300 220 T400 220" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <path d="M0 225 Q50 220 100 225 T200 225 T300 225 T400 225" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    
    <!-- Bâtiments/entrepôts arrière-plan gauche -->
    <rect x="20" y="160" width="30" height="60" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="55" y="140" width="35" height="80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="10" y="175" width="25" height="45" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    
    <!-- Bâtiments/entrepôts arrière-plan droit -->
    <rect x="320" y="150" width="40" height="70" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="355" y="165" width="30" height="55" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="340" y="180" width="35" height="40" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    
    <!-- Grues arrière-plan -->
    <g opacity="0.15">
      <!-- Grue gauche arrière -->
      <line x1="60" y1="120" x2="60" y2="220" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
      <line x1="60" y1="120" x2="140" y2="120" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
      <line x1="100" y1="120" x2="90" y2="180" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <line x1="110" y1="120" x2="100" y2="170" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <rect x="52" y="210" width="16" height="10" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      
      <!-- Grue droite arrière -->
      <line x1="340" y1="130" x2="340" y2="220" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
      <line x1="340" y1="130" x2="260" y2="130" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
      <line x1="300" y1="130" x2="310" y2="185" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <line x1="290" y1="130" x2="300" y2="175" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <rect x="332" y="210" width="16" height="10" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
    </g>
    
    <!-- Grue principale gauche -->
    <g>
      <line x1="80" y1="150" x2="80" y2="220" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
      <line x1="80" y1="150" x2="160" y2="150" stroke="rgba(255,255,255,0.4)" stroke-width="2.5"/>
      <line x1="120" y1="150" x2="110" y2="200" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <line x1="130" y1="150" x2="120" y2="190" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <line x1="140" y1="150" x2="130" y2="195" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <rect x="70" y="210" width="20" height="15" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    </g>
    
    <!-- Grue principale droite -->
    <g>
      <line x1="300" y1="150" x2="300" y2="220" stroke="rgba(255,255,255,0.4)" stroke-width="4"/>
      <line x1="300" y1="150" x2="220" y2="150" stroke="rgba(255,255,255,0.4)" stroke-width="2.5"/>
      <line x1="260" y1="150" x2="270" y2="200" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <line x1="250" y1="150" x2="260" y2="190" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <line x1="240" y1="150" x2="250" y2="195" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <rect x="290" y="210" width="20" height="15" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
    </g>
    
    <!-- Navire cargo -->
    <g>
      <!-- Coque -->
      <path d="M100 200 Q200 190 300 200 L290 220 L110 220 Z" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
      <rect x="110" y="200" width="180" height="20" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
      <!-- Superstructure (cabine) -->
      <rect x="250" y="175" width="50" height="25" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
      <!-- Cheminée -->
      <rect x="270" y="160" width="10" height="15" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
      <!-- Containers sur le pont -->
      <rect x="130" y="185" width="30" height="15" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
      <rect x="165" y="185" width="30" height="15" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
      <rect x="200" y="185" width="30" height="15" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
      <rect x="235" y="185" width="30" height="15" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
    </g>
  </g>
  
  <!-- Section texte -->
  <g transform="translate(200, 390)">
    <text x="0" y="0" font-size="15" font-weight="600" fill="white" text-anchor="middle">Système de Gestion Logistique Intégré</text>
    <text x="0" y="16" font-size="11" font-weight="400" fill="#00B4D8" text-anchor="middle">Port Autonome de Douala  Cameroun</text>
  </g>
  
  <!-- Séparateur -->
  <line x1="40" y1="440" x2="360" y2="440" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  
  <!-- Section statistiques -->
  <g transform="translate(0, 455)">
    <!-- Colonne 1 -->
    <g transform="translate(67, 0)">
      <!-- Icône dossier -->
      <path d="M-10 -8 L-6 -8 L-4 -6 L6 -6 L6 8 L-10 8 Z" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
      <text x="-2" y="28" font-size="22" font-weight="700" fill="white" text-anchor="middle">247</text>
      <text x="-2" y="42" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle" letter-spacing="0.3">Dossiers Actifs</text>
    </g>
    
    <!-- Ligne séparatrice 1 -->
    <line x1="133" y1="5" x2="133" y2="75" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    
    <!-- Colonne 2 -->
    <g transform="translate(200, 0)">
      <!-- Icône container -->
      <rect x="-10" y="-8" width="20" height="16" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
      <line x1="-10" y1="-2" x2="10" y2="-2" stroke="rgba(255,255,255,0.7)" stroke-width="1"/>
      <line x1="-10" y1="2" x2="10" y2="2" stroke="rgba(255,255,255,0.7)" stroke-width="1"/>
      <text x="0" y="28" font-size="22" font-weight="700" fill="white" text-anchor="middle">1,854</text>
      <text x="0" y="42" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">Conteneurs</text>
    </g>
    
    <!-- Ligne séparatrice 2 -->
    <line x1="267" y1="5" x2="267" y2="75" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    
    <!-- Colonne 3 -->
    <g transform="translate(333, 0)">
      <!-- Icône groupe personnes -->
      <circle cx="-6" cy="-2" r="4" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
      <path d="M-10 8 Q-6 4 -2 8" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
      <circle cx="6" cy="-2" r="4" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
      <path d="M2 8 Q6 4 10 8" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
      <text x="0" y="28" font-size="22" font-weight="700" fill="white" text-anchor="middle">89</text>
      <text x="0" y="42" font-size="9" fill="rgba(255,255,255,0.6)" text-anchor="middle">Clients</text>
    </g>
  </g>
</svg>
