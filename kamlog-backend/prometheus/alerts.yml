# Prometheus Alerting Rules for KAMLOG ERP
# This file defines alerting rules for monitoring the KAMLOG ERP application

groups:
  # Application Health Alerts
  - name: application_health
    interval: 30s
    rules:
      - alert: ApplicationDown
        expr: up{job="kamlog-backend"} == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Application is down"
          description: "The KAMLOG ERP backend application has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High latency detected"
          description: "95th percentile latency is {{ $value }}s over the last 5 minutes."

  # Database Alerts
  - name: database
    interval: 30s
    rules:
      - alert: DatabaseConnectionPoolExhausted
        expr: pg_stat_activity_count / pg_settings_max_connections > 0.9
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Database connection pool usage is {{ $value | humanizePercentage }}."

      - alert: SlowDatabaseQueries
        expr: rate(pg_stat_statements_total_exec_time_ms_sum[5m]) / rate(pg_stat_statements_total_exec_time_ms_count[5m]) > 1000
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Slow database queries detected"
          description: "Average query execution time is {{ $value }}ms over the last 5 minutes."

  # Redis Alerts
  - name: redis
    interval: 30s
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "Redis is down"
          description: "Redis instance has been down for more than 1 minute."

      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is {{ $value | humanizePercentage }}."

      - alert: RedisConnectionPoolExhausted
        expr: redis_connected_clients / redis_config_maxclients > 0.9
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Redis connection pool nearly exhausted"
          description: "Redis connection usage is {{ $value | humanizePercentage }}."

  # Business Logic Alerts
  - name: business_logic
    interval: 1m
    rules:
      - alert: HighFailedLoginAttempts
        expr: rate(auth_login_failures_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "High rate of failed login attempts"
          description: "Failed login rate is {{ $value }} per second over the last 5 minutes."

      - alert: CreditLimitExceeded
        expr: finance_credit_limit_exceeded_total > 0
        for: 1m
        labels:
          severity: warning
          team: finance
        annotations:
          summary: "Credit limit exceeded for clients"
          description: "{{ $value }} clients have exceeded their credit limit."

      - alert: FuelSiphoningDetected
        expr: transport_fuel_siphoning_alerts_total > 0
        for: 1m
        labels:
          severity: critical
          team: transport
        annotations:
          summary: "Fuel siphoning detected"
          description: "{{ $value }} fuel siphoning alerts detected."

      - alert: LowStockAlert
        expr: magasin_stock_low_total > 0
        for: 5m
        labels:
          severity: warning
          team: magasin
        annotations:
          summary: "Low stock detected"
          description: "{{ $value }} articles have low stock levels."

  # System Resources Alerts
  - name: system_resources
    interval: 30s
    rules:
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighMemoryUsage
        expr: process_resident_memory_bytes / node_memory_MemTotal_bytes > 0.8
        for: 5m
        labels:
          severity: warning
          team: ops
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}."

      - alert: DiskSpaceLow
        expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} < 0.1
        for: 5m
        labels:
          severity: critical
          team: ops
        annotations:
          summary: "Low disk space"
          description: "Disk space is {{ $value | humanizePercentage }} available."

  # API Performance Alerts
  - name: api_performance
    interval: 30s
    rules:
      - alert: HighAPIResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{endpoint!~"/health|/metrics"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High API response time"
          description: "95th percentile API response time is {{ $value }}s over the last 5 minutes."

      - alert: APIRequestRateHigh
        expr: rate(http_requests_total[5m]) > 100
        for: 5m
        labels:
          severity: info
          team: backend
        annotations:
          summary: "High API request rate"
          description: "API request rate is {{ $value }} requests per second over the last 5 minutes."

  # Cache Performance Alerts
  - name: cache_performance
    interval: 30s
    rules:
      - alert: LowCacheHitRate
        expr: rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m])) < 0.5
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is {{ $value | humanizePercentage }} over the last 10 minutes."

      - alert: HighCacheEvictionRate
        expr: rate(cache_evictions_total[5m]) > 10
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High cache eviction rate"
          description: "Cache eviction rate is {{ $value }} per second over the last 5 minutes."

  # Queue Alerts (if using task queues)
  - name: queue
    interval: 30s
    rules:
      - alert: QueueBacklogHigh
        expr: queue_length{queue="default"} > 1000
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "High queue backlog"
          description: "Queue {{ $labels.queue }} has {{ $value }} pending tasks."

      - alert: QueueProcessingSlow
        expr: rate(queue_processed_total[5m]) < 10
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Slow queue processing"
          description: "Queue processing rate is {{ $value }} tasks per second over the last 10 minutes."

  # Security Alerts
  - name: security
    interval: 1m
    rules:
      - alert: UnauthorizedAccessAttempts
        expr: rate(http_requests_total{status="401"}[5m]) > 5
        for: 5m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "High rate of unauthorized access attempts"
          description: "Unauthorized access rate is {{ $value }} per second over the last 5 minutes."

      - alert: ForbiddenAccessAttempts
        expr: rate(http_requests_total{status="403"}[5m]) > 5
        for: 5m
        labels:
          severity: warning
          team: security
        annotations:
          summary: "High rate of forbidden access attempts"
          description: "Forbidden access rate is {{ $value }} per second over the last 5 minutes."

  # Module-Specific Alerts
  - name: module_specific
    interval: 1m
    rules:
      - alert: TiersServiceSlow
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{endpoint=~"/api/tiers/.*"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
          team: backend
          module: tiers
        annotations:
          summary: "Tiers service slow response"
          description: "95th percentile response time for tiers API is {{ $value }}s."

      - alert: FinanceServiceSlow
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{endpoint=~"/api/finance/.*"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
          team: backend
          module: finance
        annotations:
          summary: "Finance service slow response"
          description: "95th percentile response time for finance API is {{ $value }}s."

      - alert: TransportServiceSlow
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{endpoint=~"/api/transport/.*"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
          team: backend
          module: transport
        annotations:
          summary: "Transport service slow response"
          description: "95th percentile response time for transport API is {{ $value }}s."

      - alert: MagasinServiceSlow
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{endpoint=~"/api/magasin/.*"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
          team: backend
          module: magasin
        annotations:
          summary: "Magasin service slow response"
          description: "95th percentile response time for magasin API is {{ $value }}s."

      - alert: ParcServiceSlow
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{endpoint=~"/api/parc/.*"}[5m])) > 1
        for: 5m
        labels:
          severity: warning
          team: backend
          module: parc
        annotations:
          summary: "Parc service slow response"
          description: "95th percentile response time for parc API is {{ $value }}s."
