[phases.setup]
nixPkgs = [
  "python311",
  "cairo",
  "pango",
  "gdk-pixbuf",
  "libffi",
  "openssl",
  "gcc",
  "fontconfig",
  "freetype",
  "harfbuzz",
  "gobject-introspection",
  "glib",
  "zlib"
]

[phases.build]
cmds = [
  "pip install --upgrade pip",
  "pip install -r requirements.txt"
]

[start]
cmd = "bash start.sh"

[variables]
PORT = "8000"
PYTHONUNBUFFERED = "1"
