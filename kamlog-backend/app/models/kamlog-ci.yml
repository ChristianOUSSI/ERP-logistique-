name: KAMLOG EM-ERP CI

on:
  push:
    branches: [ main, develop, feat/Alpha ]
  pull_request:
    branches: [ main ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: kamlog_test
          POSTGRES_PASSWORD: password
        ports: [ 5432:5432 ]
      redis:
        image: redis:7
        ports: [ 6379:6379 ]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install Dependencies
        run: |
          cd kamlog-backend
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Multi-Tenancy Security Tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/kamlog_test
        run: |
          cd kamlog-backend
          pytest tests/test_multi_tenancy.py # Ce test vérifie que l'User A ne voit pas les données de l'Agence B

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Check
        run: |
          cd kamlog-frontend
          npm install
          npm run build