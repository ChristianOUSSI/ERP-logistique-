user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Sécurité de base
    server_tokens off; # Masque la version de Nginx
    charset utf-8;

    # Optimisations de bande passante et transferts
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M; # Permet l'upload de manifestes lourds ou pièces jointes

    # Compression Gzip avancée
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # Upstreams
    upstream frontend_server {
        server frontend:3000;
        keepalive 64;
    }

    upstream backend_api {
        server backend:8000;
        keepalive 64;
    }

    # Configuration HTTP - Redirection systématique vers HTTPS
    server {
        listen 80;
        listen [::]:80;
        server_name localhost kamlog-erp.cm www.kamlog-erp.cm;

        # Validation Certbot / Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Configuration HTTPS - Niveau Sécurité World-Pro
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name kamlog-erp.cm www.kamlog-erp.cm;

        # Certificats SSL (gérés via Certbot)
        ssl_certificate /etc/letsencrypt/live/kamlog-erp.cm/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kamlog-erp.cm/privkey.pem;

        # Protocoles et Ciphers ultra-sécurisés (Modern TLS)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';

        # Optimisation Session SSL
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Security Headers (OWASP Top 10 Compliant)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # 1. CACHING STRATEGY : Assets Statiques Next.js (Immutables)
        location /_next/static/ {
            proxy_pass http://frontend_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            expires 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf|webp)$ {
            proxy_pass http://frontend_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, no-transform";
            access_log off;
        }

        # 2. ROUTING : Backend API FastAPI
        location /api/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Protection timeouts pour les longs traitements logistiques
            proxy_connect_timeout 90s;
            proxy_send_timeout 90s;
            proxy_read_timeout 90s;
        }

        # 3. ROUTING : WebSockets Réduisants les latences d'alertes
        location /ws/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s; # Évite les déconnexions intempestives du flux portuaire
            proxy_send_timeout 3600s;
        }

        # 4. ROUTING DEFAULT : Next.js Frontend App
        location / {
            proxy_pass http://frontend_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Pas de cache sur le HTML dynamique pour garantir l'actualisation des T-Codes
            add_header Cache-Control "public, max-age=0, must-revalidate";
        }
    }
}