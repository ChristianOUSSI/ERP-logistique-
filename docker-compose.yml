# docker-compose.yml  KAMLOG EM-ERP Stack Complète
version: '3.9'

services:

  # ─── PostgreSQL 17 ────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: kamlog_db
    environment:
      POSTGRES_DB:       ${DB_NAME:-kamlog_erp}
      POSTGRES_USER:     ${DB_USER:-kamlog}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kamlog_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_pgcrypto.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-kamlog}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis 7 ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: kamlog_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  # ─── MinIO (stockage objets S3) ───────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-04T19-20-08Z
    container_name: kamlog_minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER:     ${MINIO_ACCESS_KEY:-kamlog_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_secret_2026}
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'
      - '9001:9001'

  # ─── FastAPI Backend ──────────────────────────────────────
  api:
    build:
      context: ./kamlog-backend
      dockerfile: Dockerfile
    container_name: kamlog_api
    depends_on:
      db:    { condition: service_healthy }
      redis: { condition: service_started }
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-kamlog}:${DB_PASSWORD:-kamlog_secret}@db/${DB_NAME:-kamlog_erp}
      REDIS_URL:    redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
    ports:
      - '8000:8000'
    volumes:
      - ./kamlog-backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Celery Worker ────────────────────────────────────────
  worker:
    build: { context: ./kamlog-backend }
    container_name: kamlog_worker
    depends_on: [api, redis]
    command: celery -A app.tasks.celery_app worker --loglevel=info

  # ─── Next.js Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./kamlog-frontend
      dockerfile: Dockerfile
    container_name: kamlog_frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on: [api]

volumes:
  postgres_data:
  redis_data:
  minio_data:
